name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      GENERATE_EXECUTION_REPORT: true
      REPORT_PROJECT_NAME: GSTR-3B Automation
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Compute Playwright cache bucket (4 days)
      id: pw-cache
      shell: bash
      run: echo "bucket=$(( $(date +%s) / 345600 ))" >> "$GITHUB_OUTPUT"
    - name: Cache Playwright Chromium
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ steps.pw-cache.outputs.bucket }}
        restore-keys: |
          playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
          playwright-chromium-${{ runner.os }}-
    - name: Install dependencies
      run: npm ci
    - name: Validate required secrets
      shell: bash
      run: |
        missing=0
        for key in GSTHERO_EMAIL GSTHERO_PASSWORD; do
          if [ -z "${!key}" ]; then
            echo "::error::Missing GitHub secret: $key"
            missing=1
          fi
        done
        if [ "$missing" -eq 1 ]; then
          exit 1
        fi
        echo "GSTHERO credentials are configured."
      env:
        GSTHERO_EMAIL: ${{ secrets.GSTHERO_EMAIL }}
        GSTHERO_PASSWORD: ${{ secrets.GSTHERO_PASSWORD }}
    - name: Prepare report directories
      run: mkdir -p execution-logs reports
    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps
    - name: Record execution start time
      id: timing-start
      shell: bash
      run: echo "start_iso=$(date -Iseconds)" >> "$GITHUB_OUTPUT"
    - name: Run Playwright tests
      id: run-tests
      continue-on-error: true
      env:
        GSTHERO_EMAIL: ${{ secrets.GSTHERO_EMAIL }}
        GSTHERO_PASSWORD: ${{ secrets.GSTHERO_PASSWORD }}
        GSTHERO_GSTIN: ${{ secrets.GSTHERO_GSTIN }}
        GSTHERO_RETURN_MONTH: ${{ secrets.GSTHERO_RETURN_MONTH }}
      run: |
        echo "Return month: ${GSTHERO_RETURN_MONTH:-auto (previous calendar month)}"
        npx playwright test --project=chromium
    - name: Record execution end time
      id: timing-end
      if: always()
      shell: bash
      run: echo "end_iso=$(date -Iseconds)" >> "$GITHUB_OUTPUT"
    - name: Generate execution report
      if: always()
      env:
        EXECUTION_START_ISO: ${{ steps.timing-start.outputs.start_iso }}
        EXECUTION_END_ISO: ${{ steps.timing-end.outputs.end_iso }}
        WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GSTHERO_GSTIN: ${{ secrets.GSTHERO_GSTIN }}
        GSTHERO_RETURN_MONTH: ${{ secrets.GSTHERO_RETURN_MONTH }}
        RUNNER_OS: ${{ runner.os }}
      run: node scripts/generate-execution-report.js
    - name: Publish test results summary
      if: always()
      run: node scripts/publish-github-summary.js
    - name: Check SMTP configuration
      if: always()
      id: smtp-check
      shell: bash
      run: |
        missing=0
        for key in SMTP_HOST SMTP_USER SMTP_PASSWORD REPORT_EMAIL_TO; do
          if [ -z "${!key}" ]; then
            echo "::warning::Missing GitHub secret for email reports: $key"
            missing=1
          fi
        done
        if [ "$missing" -eq 0 ]; then
          echo "smtp_ready=true" >> "$GITHUB_OUTPUT"
          echo "SMTP configured. Report will be emailed to: $REPORT_EMAIL_TO"
        else
          echo "smtp_ready=false" >> "$GITHUB_OUTPUT"
          echo "Email report will be skipped until all SMTP secrets are added."
        fi
      env:
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
    - name: Send email report
      id: send-email
      if: always() && steps.smtp-check.outputs.smtp_ready == 'true'
      env:
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
        REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        REPORT_PROJECT_NAME: GSTR-3B Automation
      run: node scripts/send-report-email.js
    - name: Email delivery status
      if: always()
      shell: bash
      run: |
        if [ "${{ steps.smtp-check.outputs.smtp_ready }}" != "true" ]; then
          echo "::warning::No email sent — add SMTP_HOST, SMTP_USER, SMTP_PASSWORD, and REPORT_EMAIL_TO in GitHub Secrets."
        elif [ "${{ steps.send-email.outcome }}" = "success" ]; then
          echo "Email report sent successfully to configured recipient(s)."
        elif [ "${{ steps.send-email.outcome }}" = "failure" ]; then
          echo "::error::Email delivery failed. Check SMTP credentials (Gmail needs an App Password)."
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ github.run_id }}
        path: |
          execution-logs/
          reports/
          playwright-report/
          test-results/
        retention-days: 2
    - name: Fail workflow if tests failed
      if: steps.run-tests.outcome == 'failure'
      run: |
        echo "::error::Playwright tests failed. Open the 'Run Playwright tests' step above for the exact error."
        exit 1
