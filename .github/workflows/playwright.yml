name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      GENERATE_EXECUTION_REPORT: true
      REPORT_PROJECT_NAME: GSTR-3B Automation
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Compute Playwright cache bucket (4 days)
      id: pw-cache
      shell: bash
      run: echo "bucket=$(( $(date +%s) / 345600 ))" >> "$GITHUB_OUTPUT"
    - name: Cache Playwright Chromium
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ steps.pw-cache.outputs.bucket }}
        restore-keys: |
          playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
          playwright-chromium-${{ runner.os }}-
    - name: Install dependencies
      run: npm ci
    - name: Prepare report directories
      run: mkdir -p execution-logs reports
    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps
    - name: Record execution start time
      id: timing-start
      shell: bash
      run: echo "start_iso=$(date -Iseconds)" >> "$GITHUB_OUTPUT"
    - name: Run Playwright tests
      id: run-tests
      continue-on-error: true
      env:
        GSTHERO_EMAIL: ${{ secrets.GSTHERO_EMAIL }}
        GSTHERO_PASSWORD: ${{ secrets.GSTHERO_PASSWORD }}
        GSTHERO_GSTIN: ${{ secrets.GSTHERO_GSTIN }}
        GSTHERO_RETURN_MONTH: ${{ secrets.GSTHERO_RETURN_MONTH }}
      run: npx playwright test --project=chromium
    - name: Record execution end time
      id: timing-end
      if: always()
      shell: bash
      run: echo "end_iso=$(date -Iseconds)" >> "$GITHUB_OUTPUT"
    - name: Generate execution report
      if: always()
      env:
        EXECUTION_START_ISO: ${{ steps.timing-start.outputs.start_iso }}
        EXECUTION_END_ISO: ${{ steps.timing-end.outputs.end_iso }}
        WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GSTHERO_GSTIN: ${{ secrets.GSTHERO_GSTIN }}
        GSTHERO_RETURN_MONTH: ${{ secrets.GSTHERO_RETURN_MONTH }}
        RUNNER_OS: ${{ runner.os }}
      run: node scripts/generate-execution-report.js
    - name: Publish test results summary
      if: always()
      run: node scripts/publish-github-summary.js
    - name: Send email report
      id: send-email
      if: always()
      continue-on-error: true
      env:
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
        REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        REPORT_PROJECT_NAME: GSTR-3B Automation
      run: node scripts/send-report-email.js
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ github.run_id }}
        path: |
          execution-logs/
          reports/
          playwright-report/
          test-results/
        retention-days: 2
    - name: Fail workflow if tests failed
      if: steps.run-tests.outcome == 'failure'
      run: |
        echo "::error::Playwright tests failed. Open the 'Run Playwright tests' step above for the exact error."
        exit 1
