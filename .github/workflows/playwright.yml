name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Compute Playwright cache bucket (4 days)
      id: pw-cache
      shell: bash
      run: echo "bucket=$(( $(date +%s) / 345600 ))" >> "$GITHUB_OUTPUT"
    - name: Cache Playwright Chromium
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ steps.pw-cache.outputs.bucket }}
        restore-keys: |
          playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
          playwright-chromium-${{ runner.os }}-
    - name: Install dependencies
      run: npm ci
    - name: Prepare report directory
      run: mkdir -p reports
    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps
    - name: Run Playwright tests
      env:
        GSTHERO_EMAIL: ${{ secrets.GSTHERO_EMAIL }}
        GSTHERO_PASSWORD: ${{ secrets.GSTHERO_PASSWORD }}
        GSTHERO_GSTIN: ${{ secrets.GSTHERO_GSTIN }}
        GSTHERO_RETURN_MONTH: ${{ secrets.GSTHERO_RETURN_MONTH }}
      run: npx playwright test --project=chromium
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 2
